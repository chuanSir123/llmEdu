services:
  redis:
    image: redis:7-alpine
    container_name: llmedu-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "16379:6379"
    volumes:
      - llmedu_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  postgres:
    image: postgres:16-alpine
    container_name: llmedu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: llmedu
      POSTGRES_PASSWORD: llmedu
      POSTGRES_DB: llmedu
    ports:
      - "15432:5432"
    volumes:
      - llmedu_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llmedu -d llmedu"]
      interval: 5s
      timeout: 5s
      retries: 20
volumes:
  llmedu_redis_data:
  llmedu_pg_data:
